<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia Sư Toán 2026 (Mục tiêu 5-7 Điểm)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <h2>Gia Sư Toán THPT 2026 🎯</h2>
            <p>Hỗ trợ lấy chắc 5-7 điểm</p>
        </header>
        <div class="chat-box" id="chat-box">
            <div class="message ai">Chào bạn! Mình là AI hỗ trợ ôn thi Toán 2026. Bạn đang vướng mắc ở chuyên đề cơ bản nào?</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Nhập câu hỏi Toán của bạn vào đây...">
            <button onclick="sendMessage()">Gửi</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
