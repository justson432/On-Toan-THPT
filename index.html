<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÔN THPT TOÁN 2026 (Mục tiêu 5-7 Điểm)</title>
    <link rel="stylesheet" href="style.css">
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
</head>
<body>
    <div class="chat-container">
        <header>
            <h2>Gia Sư AI Toán THPT 2026 🎯</h2>
            <p>Hỗ trợ lấy chắc 5-7 điểm</p>
            <div class="api-setup">
        <input type="password" id="api-key-input" placeholder="Nhập mã Gemini API Key...">
        <button onclick="saveApiKey()">Lưu Key</button>
    </div>
        </header>
        <div class="chat-box" id="chat-box">
            <div class="message ai">Đây là AI hỗ trợ ôn thi Toán 2026. Đang vướng mắc câu hỏi mô đỏ</div>
        </div>
        <div id="preview-area" style="display: none;">
            <img id="image-preview" src="" alt="Preview">
            <span class="remove-btn" onclick="removeImage()">✖ Bỏ ảnh</span>
        </div>
        <div class="input-area">
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <label for="file-input" class="upload-icon">🖼️</label>
            <input type="text" id="user-input" placeholder="Nhập câu hỏi Toán vô lộ ni...">
            <button onclick="sendMessage()">Gửi</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
